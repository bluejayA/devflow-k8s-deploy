apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jvm-app
  namespace: default
spec:
  replicas: 2
  serviceName: jvm-app
  selector:
    matchLabels:
      app: jvm-app
  template:
    metadata:
      labels:
        app: jvm-app
    spec:
      serviceAccountName: jvm-app-sa
      # 기본 토큰 자동 마운트 차단 — RBAC 최소권한
      automountServiceAccountToken: false
      # Pod securityContext — 컨테이너 권한 분리 — privileged escalation 방지 (F-31)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jvm-app
          image: local/test:1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          # 프로브 — 헬스체크 — 비정상 인스턴스 자동 제거 (F-34)
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          # Container securityContext — 컨테이너 권한 분리 — privileged escalation 방지 (F-32)
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # 리소스 한도 — OOMKill로 다른 Pod 영향 방지 (F-33)
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # emptyDir 마운트(/tmp) + PVC 마운트(/data) — readOnlyRootFilesystem 공존
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
  # PVC — Pod 재기동/스케줄링과 무관하게 데이터 보존
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: "local-path"
